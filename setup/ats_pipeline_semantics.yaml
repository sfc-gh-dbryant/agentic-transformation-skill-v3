      - name: EXECUTION_ID
        expr: EXECUTION_ID
        data_type: VARCHAR
      - name: LEARNING_TYPE
        expr: LEARNING_TYPE
        data_type: VARCHAR
      - name: SOURCE_CONTEXT
        expr: SOURCE_CONTEXT
        data_type: VARCHAR
      - name: OBSERVATION
        expr: OBSERVATION
        data_type: VARCHAR
      - name: RECOMMENDATION
        expr: RECOMMENDATION
        data_type: VARCHAR
      - name: TIMES_OBSERVED
        expr: TIMES_OBSERVED
        data_type: NUMBER
      - name: IS_ACTIVE
        expr: IS_ACTIVE
        data_type: BOOLEAN
    facts:
      - name: CONFIDENCE_SCORE
        expr: CONFIDENCE_SCORE
        data_type: FLOAT
  - name: WORKFLOW_EXECUTIONS
    base_table:
      database: ATS_V3
      schema: AGENT_FRAMEWORK
      table: WORKFLOW_EXECUTIONS
