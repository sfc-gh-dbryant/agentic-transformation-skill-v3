name: ats_pipeline_semantics
description: ATS v3 Pipeline Semantic View. Enables natural language queries over
  the agentic data transformation pipeline state. Covers Bronze to Silver to Gold
  table coverage, Planner transformation strategy decisions, Reflector learnings,
  Schema Analyst FK relationships, and workflow execution history.
tables:
  - name: TABLE_LINEAGE_MAP
    base_table:
      database: ATS_V3
      schema: AGENT_FRAMEWORK
      table: TABLE_LINEAGE_MAP
    primary_key:
      columns:
        - LINEAGE_ID
    dimensions:
      - name: LINEAGE_ID
        expr: LINEAGE_ID
        data_type: VARCHAR
      - name: BRONZE_TABLE
        expr: BRONZE_TABLE
        data_type: VARCHAR
      - name: BRONZE_SCHEMA
        expr: BRONZE_SCHEMA
        data_type: VARCHAR
      - name: BRONZE_DATABASE
        expr: BRONZE_DATABASE
        data_type: VARCHAR
      - name: SILVER_TABLE
        expr: SILVER_TABLE
        data_type: VARCHAR
      - name: SILVER_SCHEMA
        expr: SILVER_SCHEMA
        data_type: VARCHAR
      - name: GOLD_TABLE
        expr: GOLD_TABLE
        data_type: VARCHAR
      - name: GOLD_SCHEMA
        expr: GOLD_SCHEMA
        data_type: VARCHAR
      - name: LAST_EXECUTION_ID
        expr: LAST_EXECUTION_ID
        data_type: VARCHAR
      - name: SILVER_STATUS
        expr: SILVER_STATUS
        data_type: VARCHAR
      - name: GOLD_STATUS
        expr: GOLD_STATUS
        data_type: VARCHAR
      - name: ROW_COUNT_BRONZE
        expr: ROW_COUNT_BRONZE
        data_type: NUMBER
      - name: ROW_COUNT_SILVER
        expr: ROW_COUNT_SILVER
        data_type: NUMBER
      - name: ROW_COUNT_GOLD
        expr: ROW_COUNT_GOLD
        data_type: NUMBER
      - name: DISCOVERY_METHOD
        expr: DISCOVERY_METHOD
        data_type: VARCHAR
    time_dimensions:
      - name: LAST_REFRESHED_AT
        expr: LAST_REFRESHED_AT
        data_type: TIMESTAMP_NTZ
      - name: CREATED_AT
        expr: CREATED_AT
        data_type: TIMESTAMP_NTZ
      - name: UPDATED_AT
        expr: UPDATED_AT
        data_type: TIMESTAMP_NTZ
    unique_keys:
      - columns:
          - BRONZE_TABLE
          - BRONZE_SCHEMA
          - BRONZE_DATABASE
  - name: PLANNER_DECISIONS
    base_table:
      database: ATS_V3
      schema: AGENT_FRAMEWORK
      table: PLANNER_DECISIONS
    primary_key:
      columns:
        - DECISION_ID
        - EXECUTION_ID
    dimensions:
      - name: DECISION_ID
        expr: DECISION_ID
        data_type: VARCHAR
      - name: EXECUTION_ID
        expr: EXECUTION_ID
        data_type: VARCHAR
      - name: SOURCE_TABLE
        expr: SOURCE_TABLE
        data_type: VARCHAR
      - name: TARGET_SCHEMA
        expr: TARGET_SCHEMA
        data_type: VARCHAR
      - name: TRANSFORMATION_STRATEGY
        expr: TRANSFORMATION_STRATEGY
        data_type: VARCHAR
      - name: PRIORITY
        expr: PRIORITY
        data_type: NUMBER
      - name: MODEL_USED
        expr: MODEL_USED
        data_type: VARCHAR
      - name: PK_COLUMNS
        expr: PK_COLUMNS
        data_type: VARCHAR
    time_dimensions:
      - name: CREATED_AT
        expr: CREATED_AT
        data_type: TIMESTAMP_NTZ
    facts:
      - name: CONFIDENCE_SCORE
        expr: CONFIDENCE_SCORE
        data_type: FLOAT
  - name: WORKFLOW_LEARNINGS
